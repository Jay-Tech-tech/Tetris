<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Tetris - Erweiterte Grafik</title>
    <style>
        body {
            background-color: #202028;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        canvas {
            background-color: #111;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }
        .anleitung {
            margin-top: 20px;
            font-size: 16px;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>Tetris</h1>
    <canvas id="tetris" width="240" height="400"></canvas>
    
    <div class="anleitung">
        <strong>Steuerung:</strong><br>
        Pfeil Links / Rechts = Bewegen<br>
        Pfeil Unten = Schneller fallen lassen<br>
        Pfeil Oben = Drehen
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scale = 20;
        context.scale(scale, scale); // Skaliert das Spielfeld

        // Das Spielfeld (die "Arena") erstellen
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        // Die verschiedenen Tetris-Formen definieren
        function createPiece(type) {
            if (type === 'T') {
                return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            } else if (type === 'O') {
                return [[2, 2], [2, 2]];
            } else if (type === 'L') {
                return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            } else if (type === 'J') {
                return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            } else if (type === 'I') {
                return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            } else if (type === 'S') {
                return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            } else if (type === 'Z') {
                return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
            }
        }

        // --- NEU: Funktion für 3D-Schattierung ---
        function drawBlock(x, y, color, isGhost = false) {
            if (isGhost) {
                // Zeichnet nur den Umriss für die Projektion
                context.fillStyle = "rgba(255, 255, 255, 0.1)";
                context.fillRect(x, y, 1, 1);
                context.strokeStyle = "rgba(255, 255, 255, 0.3)";
                context.lineWidth = 0.05;
                context.strokeRect(x, y, 1, 1);
                return;
            }

            // Grundfarbe
            context.fillStyle = color;
            context.fillRect(x, y, 1, 1);

            // Lichtkante (oben und links)
            context.fillStyle = "rgba(255, 255, 255, 0.4)";
            context.fillRect(x, y, 1, 0.15); // Oben
            context.fillRect(x, y, 0.15, 1); // Links

            // Schattenkante (unten und rechts)
            context.fillStyle = "rgba(0, 0, 0, 0.4)";
            context.fillRect(x, y + 0.85, 1, 0.15); // Unten
            context.fillRect(x + 0.85, y, 0.15, 1); // Rechts

            // Schwarzer Rahmen für Kontrast
            context.strokeStyle = "rgba(0, 0, 0, 0.8)";
            context.lineWidth = 0.05;
            context.strokeRect(x, y, 1, 1);
        }

        // --- NEU: Zeichnet das Hintergrund-Raster ---
        function drawGrid() {
            context.strokeStyle = "rgba(255, 255, 255, 0.05)";
            context.lineWidth = 0.05;
            for (let x = 0; x <= canvas.width / scale; x++) {
                context.beginPath();
                context.moveTo(x, 0);
                context.lineTo(x, canvas.height / scale);
                context.stroke();
            }
            for (let y = 0; y <= canvas.height / scale; y++) {
                context.beginPath();
                context.moveTo(0, y);
                context.lineTo(canvas.width / scale, y);
                context.stroke();
            }
        }

        // Zeichnet die Matrizen (Spielfeld oder Tetromino)
        function drawMatrix(matrix, offset, isGhost = false) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        drawBlock(x + offset.x, y + offset.y, colors[value], isGhost);
                    }
                });
            });
        }

        // --- NEU: Berechnet und zeichnet die Projektion (Ghost Piece) ---
        function drawGhostPiece() {
            const ghost = {
                matrix: player.matrix,
                pos: { x: player.pos.x, y: player.pos.y }
            };
            // Simuliere den Fall, bis eine Kollision auftritt
            while (!collide(arena, ghost)) {
                ghost.pos.y++;
            }
            ghost.pos.y--; // Einen Schritt zurück zur letzten gültigen Position
            drawMatrix(ghost.matrix, ghost.pos, true);
        }

        // Zeichnet das gesamte Spiel
        function draw() {
            context.fillStyle = '#111'; // Dunkelgrauer Hintergrund
            context.fillRect(0, 0, canvas.width / scale, canvas.height / scale);
            
            drawGrid();
            drawMatrix(arena, {x: 0, y: 0});
            drawGhostPiece();
            drawMatrix(player.matrix, player.pos);
        }

        // Überprüft Kollisionen
        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // Fügt den Block in das Spielfeld ein
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // Dreht den Block mathematisch
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        // Lässt den Block fallen
        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        // Bewegt den Block seitwärts
        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        // Erzeugt einen neuen Block
        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (Math.floor(arena[0].length / 2)) - (Math.floor(player.matrix[0].length / 2));
            
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
            }
        }

        // Rotiert den Block sicher
        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // Löscht volle Reihen
        function arenaSweep() {
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        // Die Hauptschleife des Spiels
        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }

        const colors = [
            null,
            '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF',
            '#FF8E0D', '#FFE138', '#3877FF'
        ];

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) {
                playerMove(-1);
            } else if (event.keyCode === 39) {
                playerMove(1);
            } else if (event.keyCode === 40) {
                playerDrop();
            } else if (event.keyCode === 38) {
                playerRotate(1);
            }
        });

        playerReset();
        update();
    </script>
</body>
</html>
